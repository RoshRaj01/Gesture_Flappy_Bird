<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Flappy Bird – Gesture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap');
  :root { --neon:#ffe14d; }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width:100%; height:100%;
    background:#120820;
    font-family:'Press Start 2P',monospace;
    overflow:hidden; touch-action:none;
    display:flex; align-items:center; justify-content:center;
  }

  /* ── DESKTOP layout: side by side ── */
  #app {
    display:flex; gap:24px;
    align-items:center; justify-content:center;
    padding:16px; min-height:100vh;
  }

  /* ── MOBILE layout: stacked, game on top ── */
  @media (max-width:700px) {
    #app {
      flex-direction:column;
      align-items:center;
      gap:10px;
      padding:8px;
      overflow-y:auto;
    }
    #gameCanvas {
      /* Scale canvas to fit phone width */
      max-width: calc(100vw - 16px) !important;
      height: auto !important;
    }
    #camPanel { width:100% !important; max-width:calc(100vw - 16px); }
    #camWrap  { width:100% !important; height:auto !important; aspect-ratio:4/3; }
    #handCanvas { width:100% !important; height:100% !important; }
    #instructions { font-size:15px !important; }
  }

  #gameWrap { position:relative; flex-shrink:0; }

  #gameCanvas {
    border:4px solid var(--neon);
    box-shadow:0 0 24px var(--neon), 0 0 60px rgba(255,225,77,0.2);
    image-rendering:pixelated; display:block; border-radius:4px;
    width:360px; height:640px;
  }

  #camPanel { display:flex; flex-direction:column; gap:10px; width:280px; padding-top:4px; }

  .panel-label { font-family:'VT323',monospace; font-size:12px; color:rgba(255,225,77,0.5); letter-spacing:3px; }

  #camWrap {
    position:relative; width:100%; height:210px;
    border:3px solid var(--neon); box-shadow:0 0 16px rgba(255,225,77,0.3);
    overflow:hidden; border-radius:8px;
  }
  #camWrap::before,#camWrap::after { content:''; position:absolute; width:14px; height:14px; border-color:var(--neon); border-style:solid; z-index:10; }
  #camWrap::before { top:5px; left:5px; border-width:2px 0 0 2px; }
  #camWrap::after  { bottom:5px; right:5px; border-width:0 2px 2px 0; }

  #camFeed { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }
  #handCanvas { position:absolute; top:0; left:0; width:100%; height:100%; transform:scaleX(-1); }

  #handBar { display:flex; align-items:center; gap:8px; background:rgba(0,0,0,0.6); border:2px solid rgba(255,225,77,0.3); border-radius:6px; padding:7px 10px; }
  #handBarLabel { font-family:'VT323',monospace; font-size:18px; color:var(--neon); min-width:50px; text-align:right; white-space:nowrap; }
  #handBarTrack { flex:1; height:14px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,225,77,0.2); border-radius:3px; position:relative; overflow:hidden; }
  #handBarTrack::before { content:''; position:absolute; top:0; left:50%; width:1px; height:100%; background:rgba(255,255,255,0.18); }
  #handBarFill { position:absolute; top:0; left:0; height:100%; width:0%; background:linear-gradient(90deg,#44ff88,#ffe14d); border-radius:3px; }
  #handBarDot  { position:absolute; top:50%; width:10px; height:10px; background:#fff; border:2px solid #000; border-radius:50%; transform:translate(-50%,-50%); z-index:2; }

  #instructions { font-family:'VT323',monospace; font-size:16px; color:#c8d4ff; background:rgba(10,6,30,0.8); padding:10px 12px; border:2px solid rgba(80,80,180,0.4); border-radius:8px; line-height:1.8; }
  #instructions .sec { color:var(--neon); font-size:11px; letter-spacing:2px; display:block; margin-bottom:2px; }
  #instructions .sep { border:none; border-top:1px solid rgba(80,80,180,0.35); margin:6px 0; }

  /* mobile: hide verbose instructions to save space */
  @media (max-width:700px) { #instructions .mobile-hide { display:none; } }

  #camStatus { font-family:'VT323',monospace; font-size:14px; color:#f84; text-align:center; }

  /* Overlay */
  #overlay { position:absolute; top:0; left:0; right:0; bottom:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(0,0,0,0.62); gap:12px; pointer-events:none; }
  #overlay.active { pointer-events:all; }
  #overlay .card { background:rgba(0,0,0,0.8); border:2px solid var(--neon); border-radius:8px; padding:10px 18px; text-align:center; box-shadow:0 0 14px rgba(255,225,77,0.2); }
  #overlay h1 { font-size:16px; color:var(--neon); text-shadow:0 0 10px var(--neon); line-height:1.8; }
  #overlay p  { font-size:8px; color:#fff; line-height:2.2; }
  #overlay .score-big { font-size:32px; color:#fff; text-shadow:0 0 8px #fff; }
  .mode-btn { font-family:'Press Start 2P',monospace; font-size:8px; color:#111; background:var(--neon); border:none; border-radius:6px; padding:10px 16px; cursor:pointer; margin:4px; box-shadow:0 0 10px rgba(255,225,77,0.4); line-height:1.8; touch-action:manipulation; }
</style>
</head>
<body>
<div id="app">
  <div id="gameWrap">
    <canvas id="gameCanvas" width="360" height="640"></canvas>
    <div id="overlay" class="active">
      <div class="card"><h1>🐦 FLAPPY<br>GESTURE</h1></div>
      <div class="card"><p>✋ Move hand UP/DOWN to guide bird<br>🤌 Pinch to START &amp; mark flap<br>🍎 Collect fruits · 🐦 Dodge enemies<br><br><span id="camReadyMsg">📷 Allow camera access</span></p></div>
    </div>
  </div>

  <div id="camPanel">
    <div class="panel-label">📷 CAMERA FEED</div>
    <div id="camWrap">
      <video id="camFeed" autoplay playsinline muted></video>
      <canvas id="handCanvas"></canvas>
    </div>
    <div id="handBar">
      <div id="handBarLabel">—</div>
      <div id="handBarTrack">
        <div id="handBarFill"></div>
        <div id="handBarDot" style="left:50%"></div>
      </div>
    </div>
    <div id="camStatus"></div>
    <div id="instructions">
      <span class="sec">— CONTROLS —</span>
      ✋ Hand HIGH → bird UP<br>
      ✋ Hand LOW → bird DOWN<br>
      🤌 Pinch → collect fruit
      <hr class="sep">
      <span class="sec">— COLLECT —</span>
      🍎 Pinch near fruit to grab<br>
      🐦 Enemy birds = death

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script>
// ─────────────────────────────────────────────────────
//  MOBILE CANVAS SCALING
//  The canvas is always 360×640 internally.
//  On mobile we CSS-scale it to fit the screen width.
// ─────────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');
const W = 360, H = 640;

function scaleCanvas() {
  const isMobile = window.innerWidth <= 700;
  if (isMobile) {
    const scale = (window.innerWidth - 16) / W;
    canvas.style.width  = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
    // Also scale handCanvas display inside camWrap
    const hw = document.getElementById('handCanvas');
    hw.width  = 280; hw.height = 210;
  } else {
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    const hw = document.getElementById('handCanvas');
    hw.width  = 280; hw.height = 210;
  }
}
scaleCanvas();
window.addEventListener('resize', scaleCanvas);

const overlay     = document.getElementById('overlay');
const handBarFill = document.getElementById('handBarFill');
const handBarDot  = document.getElementById('handBarDot');
const handBarLabel= document.getElementById('handBarLabel');

// ─────────────────────────────────────────────────────
//  FIXED TIMESTEP CONSTANTS
// ─────────────────────────────────────────────────────
const TICK_RATE  = 60;
const TICK_MS    = 1000 / TICK_RATE;
let   accumulator = 0, lastTime = null;
let   fps = 0, fpsCount = 0, fpsTimer = 0;

const GRAVITY       = 0.32;
const FLAP_FORCE    = -9;
const PIPE_SPEED    = 2.8;
const PIPE_GAP      = 155;
const PIPE_INTERVAL = 1600;
const FRUIT_INTERVAL= 3200;
const ENEMY_INTERVAL= 4800;
const FRUITS = ['🍎','🍊','🍋','🍇','🍓','🫐'];

let handY = null;

let game = {
  state:'idle',
  bird:{x:80,y:H/2,vy:0,angle:0,flapAnim:0},
  pipes:[], fruits:[], enemies:[], effects:[],
  score:0, best:0,
  clouds:[{x:80,y:80},{x:220,y:120},{x:310,y:60}],
  lastPipe:0, lastFruit:0, lastEnemy:0,
  tick:0, groundX:0, lastFlapTick:-999,
};

function spawnPipe() {
  const topH = 80+Math.random()*(H-80-80-PIPE_GAP-80);
  game.pipes.push({x:W+10,topH,scored:false});
}
function spawnFruit() {
  let y;
  const r=Math.random();
  if (game.pipes.length>0) {
    const lp=game.pipes[game.pipes.length-1];
    const gc=lp.topH+PIPE_GAP/2, gt=lp.topH+30, gb=lp.topH+PIPE_GAP-30;
    y = r<0.4 ? gc+(Math.random()-0.5)*40 : r<0.7 ? gt+Math.random()*25 : gb-Math.random()*25;
  } else { y=120+Math.random()*(H-300); }
  game.fruits.push({x:W+20,y,type:FRUITS[Math.floor(Math.random()*FRUITS.length)],bob:Math.random()*Math.PI*2});
}
function spawnEnemy() {
  game.enemies.push({x:W+20,y:60+Math.random()*(H-200),vy:(Math.random()-0.5)*1.8,frame:0});
}

function resetGame() {
  game.bird={x:80,y:H/2,vy:0,angle:0,flapAnim:0};
  game.pipes=[];game.fruits=[];game.enemies=[];game.effects=[];
  game.score=0;game.state='playing';
  const now=Date.now();
  game.lastPipe=now;game.lastFruit=now+2000;game.lastEnemy=now+3500;
  game.tick=0;game.lastFlapTick=-999;
  overlay.style.display='none';
}

function flap() {
  if (game.state==='idle'||game.state==='dead'){resetGame();return;}
  if (game.state==='playing') game.lastFlapTick=game.tick;
}

function checkCollision() {
  const {x,y}=game.bird,r=12;
  if (y+r>=H-80||y-r<=0) return 'wall';
  for(const p of game.pipes)
    if(x+r>p.x+4&&x-r<p.x+60&&(y-r<p.topH||y+r>p.topH+PIPE_GAP)) return 'pipe';
  for(const e of game.enemies)
    if(Math.hypot(x-e.x,y-e.y)<22) return 'enemy';
  return null;
}

// ─────────────────────────────────────────────────────
//  PHYSICS TICK — always 60/s
// ─────────────────────────────────────────────────────
function physicsTick() {
  game.tick++;
  const speed=PIPE_SPEED+Math.floor(game.score/10)*0.5;
  game.clouds.forEach(c=>{c.x-=0.4;if(c.x<-60)c.x=W+60;});
  game.groundX=(game.groundX-speed)%20;

  if(game.state==='idle'){
    game.bird.y=H/2+Math.sin(game.tick*0.04)*12;
    game.bird.flapAnim+=0.2; game.bird.angle=0; return;
  }
  if(game.state!=='playing') return;

  if(handY!==null){
    const tY=30+handY*(H-140);
    game.bird.vy+=(tY-game.bird.y)*0.06;
    game.bird.vy*=0.78;
  } else {
    game.bird.vy+=GRAVITY;
  }
  game.bird.vy=Math.max(-12,Math.min(12,game.bird.vy));
  game.bird.y+=game.bird.vy;
  game.bird.angle=Math.min(Math.PI/3,Math.max(-Math.PI/4,game.bird.vy*0.06));
  game.bird.flapAnim+=0.35;

  const now=Date.now();
  if(now-game.lastPipe >PIPE_INTERVAL) {spawnPipe(); game.lastPipe =now;}
  if(now-game.lastFruit>FRUIT_INTERVAL){spawnFruit();game.lastFruit=now;}
  if(now-game.lastEnemy>ENEMY_INTERVAL){spawnEnemy();game.lastEnemy=now;}

  game.pipes.forEach(p=>{
    p.x-=speed;
    if(!p.scored&&p.x+60<game.bird.x){p.scored=true;game.score++;}
  });
  game.pipes=game.pipes.filter(p=>p.x>-80);

  const flapRecent=(game.tick-game.lastFlapTick)<20;
  game.fruits.forEach(f=>{
    f.x-=speed; f.bob+=0.07; f.y+=Math.sin(f.bob)*0.4;
    const d=Math.hypot(game.bird.x-f.x,game.bird.y-f.y);
    if(d<20){
      if(flapRecent){
        game.score++;
        game.effects.push({x:f.x,y:f.y,text:'+1 '+f.type,life:35,vy:-1.5});
        f.x=-999;
      } else if(!f._hint||game.tick-f._hintTick>20){
        f._hint=true;f._hintTick=game.tick;
        game.effects.push({x:f.x,y:f.y-30,text:'PINCH!',life:25,vy:-0.8,col:'#ff4'});
      }
    }
  });
  game.fruits=game.fruits.filter(f=>f.x>-100);

  game.enemies.forEach(e=>{
    e.x-=speed+1;e.y+=e.vy;e.frame++;
    if(e.y<40||e.y>H-100)e.vy*=-1;
  });
  game.enemies=game.enemies.filter(e=>e.x>-50);
  game.effects.forEach(ef=>{ef.y+=ef.vy;ef.life--;});
  game.effects=game.effects.filter(ef=>ef.life>0);

  const hit=checkCollision();
  if(hit){game.state='dead';if(game.score>game.best)game.best=game.score;showDead(hit);}
}

// ─────────────────────────────────────────────────────
//  DRAW
// ─────────────────────────────────────────────────────
function drawBird(x,y,fa){
  const b=Math.sin(fa)*4;
  ctx.fillStyle='#f5c842';ctx.beginPath();ctx.ellipse(x,y,18,14,-0.3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e0a800';ctx.beginPath();ctx.ellipse(x-4,y+b,10,6,0.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+7,y-4,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(x+8,y-4,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x+9,y-5,1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f97316';ctx.beginPath();
  ctx.moveTo(x+14,y-2);ctx.lineTo(x+22,y+1);ctx.lineTo(x+14,y+4);ctx.closePath();ctx.fill();
}
function drawEnemy(x,y,frame){
  const fl=Math.sin(frame*0.25)*5;
  ctx.fillStyle='#e03030';ctx.beginPath();ctx.ellipse(x,y,16,12,0.2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#a01010';ctx.beginPath();ctx.ellipse(x+2,y+fl,9,5,-0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x-5,y-3,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#f00';ctx.beginPath();ctx.arc(x-5,y-3,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff9900';ctx.beginPath();
  ctx.moveTo(x-14,y);ctx.lineTo(x-8,y-2);ctx.lineTo(x-8,y+2);ctx.closePath();ctx.fill();
  ctx.strokeStyle='#800';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(x-8,y-7);ctx.lineTo(x-3,y-5);ctx.stroke();
}
function drawPipe(x,topH,gap){
  const pw=60,capH=20,capW=68;
  const g1=ctx.createLinearGradient(x,0,x+pw,0);
  g1.addColorStop(0,'#5aaf20');g1.addColorStop(0.4,'#73bf2e');g1.addColorStop(1,'#3a7a10');
  const g2=ctx.createLinearGradient(x-4,0,x+capW,0);
  g2.addColorStop(0,'#5aaf20');g2.addColorStop(0.4,'#73bf2e');g2.addColorStop(1,'#3a7a10');
  ctx.fillStyle=g1;ctx.fillRect(x,0,pw,topH);
  ctx.fillStyle=g2;ctx.fillRect(x-4,topH-capH,capW,capH);
  const botY=topH+gap;
  ctx.fillStyle=g1;ctx.fillRect(x,botY,pw,H-botY-80);
  ctx.fillStyle=g2;ctx.fillRect(x-4,botY,capW,capH);
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.fillRect(x+6,0,8,topH);ctx.fillRect(x+6,botY+capH,8,H-botY-capH-80);
}
function drawBg(){
  const sky=ctx.createLinearGradient(0,0,0,H-80);
  sky.addColorStop(0,'#1a8fe0');sky.addColorStop(1,'#6dd5f5');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H-80);
  game.clouds.forEach(c=>{
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.beginPath();ctx.ellipse(c.x,c.y,38,18,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x+28,c.y+5,28,14,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(c.x-22,c.y+5,22,12,0,0,Math.PI*2);ctx.fill();
  });
  const grd=ctx.createLinearGradient(0,H-80,0,H);
  grd.addColorStop(0,'#ded895');grd.addColorStop(1,'#c8b866');
  ctx.fillStyle=grd;ctx.fillRect(0,H-80,W,80);
  ctx.fillStyle='#c8b866';ctx.fillRect(0,H-80,W,8);
  ctx.fillStyle='rgba(0,0,0,0.08)';
  for(let i=0;i<W;i+=20)ctx.fillRect(i,H-65,8,4);
}

function render(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  game.pipes.forEach(p=>drawPipe(p.x,p.topH,PIPE_GAP));
  game.fruits.forEach(f=>{
    ctx.save();
    ctx.beginPath();ctx.arc(f.x,f.y,18,0,Math.PI*2);
    ctx.fillStyle='rgba(255,240,100,0.25)';ctx.fill();
    ctx.strokeStyle='rgba(255,220,80,0.7)';ctx.lineWidth=2;ctx.stroke();
    ctx.shadowColor='rgba(255,220,80,1)';ctx.shadowBlur=24;
    ctx.font='26px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(f.type,f.x,f.y);
    ctx.restore();
  });
  game.enemies.forEach(e=>{
    ctx.save();ctx.shadowColor='rgba(255,0,0,0.4)';ctx.shadowBlur=12;
    drawEnemy(e.x,e.y,e.frame);ctx.restore();
  });
  game.effects.forEach(ef=>{
    ctx.globalAlpha=ef.life/35;
    ctx.font='bold 11px "Press Start 2P"';
    ctx.fillStyle=ef.col||'#ffe14d';ctx.textAlign='center';
    ctx.fillText(ef.text,ef.x,ef.y);
    ctx.globalAlpha=1;
  });
  ctx.save();
  ctx.translate(game.bird.x,game.bird.y);ctx.rotate(game.bird.angle);
  ctx.translate(-game.bird.x,-game.bird.y);
  drawBird(game.bird.x,game.bird.y,game.bird.flapAnim);
  ctx.restore();

  if(game.state==='playing'){
    ctx.textAlign='center';
    ctx.font='26px "Press Start 2P"';
    ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillText(game.score,W/2+2,52);
    ctx.fillStyle='#fff';ctx.fillText(game.score,W/2,50);
    ctx.font='7px "Press Start 2P"';
    ctx.fillStyle='rgba(255,255,255,0.4)';
    const lv=Math.floor(game.score/10);
    ctx.fillText(lv===0?'✋ GESTURE MODE':'⚡LV'+lv,W/2,66);
  }
  // FPS
  const fc=fps>=55?'#44ff88':fps>=40?'#ffe14d':'#ff4444';
  ctx.font='8px "Press Start 2P"';ctx.textAlign='left';
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillText('FPS:'+fps,9,17);
  ctx.fillStyle=fc;ctx.fillText('FPS:'+fps,8,16);
}

// ─────────────────────────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────────────────────────
function loop(ts){
  fpsCount++;
  fpsTimer+=ts-(lastTime||ts);
  if(fpsTimer>=1000){fps=fpsCount;fpsCount=0;fpsTimer-=1000;}
  if(lastTime!==null){
    let el=Math.min(ts-lastTime,200);
    accumulator+=el;
    while(accumulator>=TICK_MS){physicsTick();accumulator-=TICK_MS;}
  }
  lastTime=ts;
  render();
  requestAnimationFrame(loop);
}

function showDead(reason){
  overlay.style.display='flex';overlay.classList.add('active');
  const msg=reason==='enemy'?'💥 Hit an enemy!':reason==='wall'?'💀 Hit the border!':'💀 Hit a pipe!';
  overlay.innerHTML=`
    <div class="card"><h1>GAME OVER</h1></div>
    <div class="card">
      <p>${msg}</p><br>
      <p class="score-big">${game.score}</p>
      <p style="font-size:8px;margin-top:6px">BEST: ${game.best}</p>
    </div>
    <div class="card"><button class="mode-btn" onclick="resetGame()">▶ PLAY AGAIN</button></div>`;
}

// Tap on canvas = flap (works on mobile touch too)
canvas.addEventListener('click', flap);

requestAnimationFrame(loop);

// ─────────────────────────────────────────────────────
//  MEDIAPIPE
// ─────────────────────────────────────────────────────
const video     =document.getElementById('camFeed');
const handCanvas=document.getElementById('handCanvas');
const hCtx      =handCanvas.getContext('2d');
const camStatus =document.getElementById('camStatus');
let lastPinchTime=0;
const PINCH_CD=350;

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

function updateBar(y){
  const p=Math.round((1-y)*100);
  handBarFill.style.width=p+'%';
  handBarDot.style.left=p+'%';
  if(y<0.33){handBarLabel.textContent='⬆ HIGH';handBarFill.style.background='linear-gradient(90deg,#44ff88,#ffe14d)';handBarDot.style.background='#44ff88';}
  else if(y>0.66){handBarLabel.textContent='⬇ LOW';handBarFill.style.background='linear-gradient(90deg,#ff6644,#ffe14d)';handBarDot.style.background='#ff6644';}
  else{handBarLabel.textContent='✋ MID';handBarFill.style.background='linear-gradient(90deg,#44aaff,#ffe14d)';handBarDot.style.background='#44aaff';}
}

function onResults(results){
  hCtx.clearRect(0,0,handCanvas.width,handCanvas.height);
  if(!results.multiHandLandmarks||!results.multiHandLandmarks.length){
    handY=null;handBarFill.style.width='0%';handBarDot.style.left='50%';handBarLabel.textContent='—';return;
  }
  const lm=results.multiHandLandmarks[0];
  const thumb=lm[4],index=lm[8];
  drawConnectors(hCtx,lm,HAND_CONNECTIONS,{color:'rgba(255,225,77,0.6)',lineWidth:2});
  drawLandmarks(hCtx,lm,{color:'#fff',fillColor:'rgba(255,100,100,0.8)',lineWidth:1,radius:3});
  const tips=[lm[4],lm[8],lm[12],lm[16],lm[20]];
  handY=tips.reduce((s,t)=>s+t.y,0)/tips.length;
  updateBar(handY);
  const pinching=dist(thumb,index)<0.08;
  if(pinching){const now=Date.now();if(now-lastPinchTime>PINCH_CD){lastPinchTime=now;flap();}}
  [thumb,index].forEach((t,i)=>{
    hCtx.beginPath();hCtx.arc(t.x*handCanvas.width,t.y*handCanvas.height,9,0,Math.PI*2);
    hCtx.fillStyle=pinching?'#ff4444':(i===0?'#ffe14d':'#44ff88');
    hCtx.fill();hCtx.strokeStyle='#fff';hCtx.lineWidth=2;hCtx.stroke();
  });
  hCtx.beginPath();
  hCtx.moveTo(thumb.x*handCanvas.width,thumb.y*handCanvas.height);
  hCtx.lineTo(index.x*handCanvas.width,index.y*handCanvas.height);
  hCtx.strokeStyle=pinching?'#ff4444':'rgba(255,225,77,0.7)';
  hCtx.lineWidth=pinching?3:1.5;hCtx.stroke();
}

async function initCamera(){
  try{
    camStatus.textContent='Loading...';
    // Request camera — on iOS Safari we must explicitly ask for video
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:'user', width:{ideal:320}, height:{ideal:240} },
      audio:false
    });
    video.srcObject = stream;
    await video.play();

    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    const isMobile = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
    hands.setOptions({maxNumHands:1,modelComplexity:isMobile?0:1,minDetectionConfidence:0.7,minTrackingConfidence:0.6});
    hands.onResults(onResults);

    // Use manual frame loop instead of Camera util — more compatible on mobile
    async function sendFrame(){
      if(video.readyState>=2) await hands.send({image:video});
      requestAnimationFrame(sendFrame);
    }
    sendFrame();

    camStatus.textContent='';
    const msg=document.getElementById('camReadyMsg');
    if(msg) msg.textContent='📷 Camera ready — show your hand!';
  } catch(err){
    console.error(err);
    camStatus.textContent='⚠ Camera blocked — use tap/SPACE';
    const msg=document.getElementById('camReadyMsg');
    if(msg) msg.textContent='⚠ No camera — tap to flap!';
  }
}
window.addEventListener('load',()=>setTimeout(initCamera,600));
</script>
